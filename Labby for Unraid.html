document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;background:rgba(0,0,0,0.8);z-index:100\"><\u002Fdiv>\n    <div style=\"position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;background:#fff;border:1px solid #f5f5f5;border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.2);padding:24px;max-width:520px;width:calc(100vw - 48px);box-sizing:border-box;display:flex;flex-direction:column;gap:18px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n        <div style=\"display:flex;flex-direction:column;gap:4px\">\n          <strong style=\"font-size:18px;font-weight:600\">{{ addTitle }}<\u002Fstrong>\n          <span style=\"font-size:13px;color:#737373\">Registered servers are probed and their catalog discovered automatically.<\u002Fspan>\n        <\u002Fdiv>\n        <span sc-camel-on-click=\"{{ closeAdd }}\" style=\"color:#a3a3a3;cursor:pointer;font-size:14px;padding:4px;border-radius:4px\" style-hover=\"background:#f5f5f5;color:#1c1b1b\">✕<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ addIsAdd }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex;align-items:center;border-radius:6px;background:#e5e5e5;padding:4px;gap:2px;align-self:flex-start\">\n          <span sc-camel-on-click=\"{{ modeManual }}\" style=\"display:inline-flex;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;user-select:none;background:{{ manualBg }};color:{{ manualColor }}\">Manual<\u002Fspan>\n          <span sc-camel-on-click=\"{{ modeImport }}\" style=\"display:inline-flex;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;user-select:none;background:{{ importBg }};color:{{ importColor }}\">Import .mcp.json<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ importOn }}\" hint-placeholder-val=\"{{ false }}\">\n        <textarea value=\"{{ importText }}\" sc-camel-on-input=\"{{ setImportText }}\" placeholder=\"{&quot;mcpServers&quot;: {&quot;my-server&quot;: {&quot;url&quot;: &quot;https://example.com/mcp&quot;}}}\" rows=\"{{ 8 }}\" style=\"resize:vertical;border:1px solid #e5e5e5;border-radius:6px;padding:10px 12px;font-size:12px;font-family:ui-monospace,Menlo,monospace;color:#1c1b1b;outline:none;min-height:120px\" style-focus=\"border-color:#ff8c2f;box-shadow:0 0 0 3px rgba(255,140,47,0.2)\"><\u002Ftextarea>\n        <sc-if value=\"{{ importError }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:#bd1818\">{{ importError }}<\u002Fspan><\u002Fsc-if>\n        <div style=\"display:flex;justify-content:flex-end;gap:8px\">\n          <button sc-camel-on-click=\"{{ closeAdd }}\" style=\"height:38px;padding:8px 16px;border-radius:6px;border:none;background:#f5f5f5;color:#171717;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit\" style-hover=\"background:#ebebeb\">Cancel<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ submitImport }}\" style=\"padding:10px 18px;border-radius:6px;border:2px solid transparent;background:linear-gradient(90deg,#e22828,#ff8c2f) border-box;color:#fff;font-size:14px;font-weight:600;line-height:1;cursor:pointer;font-family:inherit;opacity:{{ importSubmitOpacity }}\" style-hover=\"background:linear-gradient(90deg,rgba(226,40,40,0.6),rgba(255,140,47,0.6)) border-box\">Import<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ manualOn }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-form-grid=\"\" style=\"display:grid;grid-template-columns:35% 1fr;align-items:center;column-gap:12px;row-gap:16px\">\n        <label style=\"font-size:14px;font-weight:500;text-align:end\">Name<\u002Flabel>\n        <input value=\"{{ addName }}\" sc-camel-on-input=\"{{ setAddName }}\" placeholder=\"my-server\" style=\"height:38px;box-sizing:border-box;border-radius:6px;border:1px solid #e5e5e5;background:#fff;padding:8px 12px;font-size:13px;font-family:ui-monospace,Menlo,monospace;color:#1c1b1b;outline:none;min-width:0\" style-focus=\"border-color:#ff8c2f;box-shadow:0 0 0 3px rgba(255,140,47,0.2)\">\n        <label style=\"font-size:14px;font-weight:500;text-align:end\">Transport<\u002Flabel>\n        <sc-raw-select value=\"{{ addTransport }}\" sc-camel-on-change=\"{{ setAddTransport }}\" style=\"height:38px;border-radius:6px;border:1px solid #e5e5e5;background:#fff;padding:0 12px;font-size:13px;font-family:inherit;color:#1c1b1b;outline:none;justify-self:start;min-width:180px\" style-focus=\"border-color:#ff8c2f\">\n          <option value=\"http\">http<\u002Foption><option value=\"stdio\">stdio<\u002Foption>\n        <\u002Fsc-raw-select>\n        <label style=\"font-size:14px;font-weight:500;text-align:end\">{{ addEndpointLabel }}<\u002Flabel>\n        <input value=\"{{ addEndpoint }}\" sc-camel-on-input=\"{{ setAddEndpoint }}\" placeholder=\"{{ addEndpointPlaceholder }}\" style=\"height:38px;box-sizing:border-box;border-radius:6px;border:1px solid #e5e5e5;background:#fff;padding:8px 12px;font-size:13px;font-family:ui-monospace,Menlo,monospace;color:#1c1b1b;outline:none;min-width:0\" style-focus=\"border-color:#ff8c2f;box-shadow:0 0 0 3px rgba(255,140,47,0.2)\">\n        <label style=\"font-size:14px;font-weight:500;text-align:end\">Enable now<\u002Flabel>\n        <span sc-camel-on-click=\"{{ toggleAddEnabled }}\" role=\"switch\" style=\"display:inline-flex;align-items:center;height:24px;width:44px;border-radius:9999px;border:2px solid transparent;cursor:pointer;transition:background 0.15s;background:{{ addEnabledBg }}\"><span style=\"display:block;height:20px;width:20px;border-radius:9999px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.25);transition:transform 0.15s;transform:{{ addEnabledTransform }}\"><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:flex-end;gap:8px\">\n        <button sc-camel-on-click=\"{{ closeAdd }}\" style=\"height:38px;padding:8px 16px;border-radius:6px;border:none;background:#f5f5f5;color:#171717;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit\" style-hover=\"background:#ebebeb\">Cancel<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ submitAdd }}\" style=\"padding:10px 18px;border-radius:6px;border:2px solid transparent;background:linear-gradient(90deg,#e22828,#ff8c2f) border-box;color:#fff;font-size:14px;font-weight:600;line-height:1;cursor:pointer;font-family:inherit;transition:all 0.15s;opacity:{{ addSubmitOpacity }}\" style-hover=\"background:linear-gradient(90deg,rgba(226,40,40,0.6),rgba(255,140,47,0.6)) border-box;box-shadow:0 4px 6px -1px rgba(0,0,0,0.12)\">{{ addSubmitLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ deleteOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ cancelDelete }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100\"><\u002Fdiv>\n    <div style=\"position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;background:#fff;border:1px solid #f5f5f5;border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.2);padding:24px;max-width:440px;width:calc(100vw - 48px);box-sizing:border-box;display:flex;flex-direction:column;gap:14px\">\n      <strong style=\"font-size:18px;font-weight:600\">Remove {{ deleteName }}?<\u002Fstrong>\n      <p style=\"margin:0;font-size:14px;color:#737373;line-height:1.5\">The server is removed from the gateway config. Its catalog and stats are discarded; clients lose access immediately.<\u002Fp>\n      <div style=\"display:flex;justify-content:flex-end;gap:8px\">\n        <button sc-camel-on-click=\"{{ cancelDelete }}\" style=\"height:38px;padding:8px 16px;border-radius:6px;border:none;background:#f5f5f5;color:#171717;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit\" style-hover=\"background:#ebebeb\">Cancel<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ confirmDelete }}\" style=\"height:38px;padding:8px 16px;border-radius:6px;border:none;background:#e22828;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\" style-hover=\"opacity:0.9\">Remove<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ logsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeLogs }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100\"><\u002Fdiv>\n    <div style=\"position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;width:min(760px,calc(100vw - 48px));height:min(480px,calc(100vh - 96px));border-radius:8px;overflow:hidden;border:1px solid #1d3d4e;background:#07131c;display:flex;flex-direction:column;box-shadow:0 20px 40px -12px rgba(0,0,0,0.4)\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:10px 14px;background:#102330;border-bottom:1px solid #1d3d4e;flex:none\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:0.095em;text-transform:uppercase;color:#29b6f6\">Server log<\u002Fspan>\n        <span style=\"font-size:12px;font-family:ui-monospace,Menlo,monospace;color:#a7bcc9\">{{ logsName }}<\u002Fspan>\n        <span style=\"flex:1\"><\u002Fspan>\n        <span sc-camel-on-click=\"{{ closeLogs }}\" style=\"color:#5f7d8e;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:13px\" style-hover=\"background:#17364b;color:#e6f4fb\">✕<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow:auto;padding:10px 0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6\">\n        <sc-for list=\"{{ logsLines }}\" as=\"ln\" hint-placeholder-count=\"10\">\n          <div style=\"display:flex;gap:10px;padding:1px 14px;align-items:baseline\" style-hover=\"background:#17364b\">\n            <span style=\"color:#5f7d8e;flex:none\">{{ ln.time }}<\u002Fspan>\n            <span style=\"flex:none;width:44px;font-weight:600;color:{{ ln.levelColor }}\">{{ ln.level }}<\u002Fspan>\n            <span style=\"color:#e6f4fb;min-width:0;white-space:pre-wrap\">{{ ln.msg }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:110;pointer-events:none\">\n    <sc-for list=\"{{ toasts }}\" as=\"t\" hint-placeholder-count=\"0\">\n      <div style=\"display:flex;align-items:center;gap:10px;background:#fff;color:#1c1b1b;border:1px solid #e5e5e5;border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.12);padding:13px 16px;min-width:260px;max-width:340px;pointer-events:auto\">\n        <span style=\"width:18px;height:18px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;background:{{ t.iconBg }}\">{{ t.icon }}<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:1px;min-width:0\">\n          <span style=\"font-size:13.5px;font-weight:600\">{{ t.title }}<\u002Fspan>\n          <sc-if value=\"{{ t.hasDesc }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12.5px;color:#737373\">{{ t.desc }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;defaultTab&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;overview&quot;, &quot;gateway&quot;], &quot;default&quot;: &quot;gateway&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Pages&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: (this.props.defaultTab ?? 'gateway') === 'overview' ? 0 : 1, win: '24h', updated: 'updated 12s ago', spin: false, spinAll: false,\n    sortKey: 'name', sortDir: 1, sel: {}, expanded: null, attnOpen: true, attnLens: false, q: '', kb: -1,\n    toasts: [],\n    custom: [],\n    addOpen: false, addName: '', addTransport: 'http', addEndpoint: '', addEnabled: true,\n    editId: null, importMode: false, importText: '', importError: '',\n    overrides: {}, removed: {}, exposedOff: {},\n    deleteId: null, logsId: null, tpm: 127, tick: 0,\n  };\n  servers() {\n    const { overrides, removed, custom } = this.state;\n    return this.baseServers().concat(custom)\n      .filter((sv) => !removed[sv.id])\n      .map((sv) => (overrides[sv.id] ? { ...sv, ...overrides[sv.id] } : sv));\n  }\n  toolsFor(sv) {\n    const known = {\n      axon: ['search', 'crawl', 'scrape', 'extract_links', 'summarize'],\n      playwright: ['browser_navigate', 'browser_click', 'browser_type', 'browser_snapshot', 'browser_screenshot'],\n      filesystem: ['read_file', 'write_file', 'list_directory', 'search_files', 'get_file_info'],\n      github: ['search_repositories', 'get_file_contents', 'create_issue', 'list_pull_requests', 'merge_pull_request'],\n      'brave-search': ['brave_web_search', 'brave_local_search'],\n      context7: ['resolve-library-id', 'get-library-docs'],\n    };\n    const names = known[sv.name] || Array.from({ length: Math.min(sv.tools, 5) }, (_, i) => sv.name + '_tool_' + (i + 1));\n    return names.slice(0, 6);\n  }\n\n  baseServers() {\n    return [\n      { id: 'axon', name: 'axon', transport: 'http', endpoint: 'https://axon.tootie.tv/mcp', enabled: true, connected: true, healthy: true, auth: false, clients: 4, uptimePct: 99.98, tools: 21, res: 4, prompts: 2, calls: 8420, p95: '412ms', err: 0.2 },\n      { id: 'playwright', name: 'playwright', transport: 'stdio', endpoint: 'npx @playwright/mcp@latest', enabled: true, connected: true, healthy: true, auth: false, clients: 2, uptimePct: 99.4, tools: 24, res: 1, prompts: 0, calls: 3210, p95: '1.9s', err: 1.1 },\n      { id: 'github', name: 'github', transport: 'http', endpoint: 'https://api.githubcopilot.com/mcp/', enabled: true, connected: false, healthy: false, auth: true, clients: 0, uptimePct: 91.2, tools: 36, res: 2, prompts: 5, calls: 1890, p95: '640ms', err: 4.8, l Cols: [\n        { label: 'Transport', key: 'transport', justify: 'start' }, { label: 'Clients', key: 'clients', justify: 'center' },\n        { label: 'Uptime', key: 'uptime', justify: 'center' }, { label: 'Exposed', key: 'exposed', justify: 'center' },\n      ].map((c) => ({ ...c, onSort: sortBy(c.key), arrow: arrow(c.key) })),\n      selActive: selCount > 0,\n      selLabel: selCount + ' selected',\n      selEnable: () => { this.addToast('Enabled', selCount + ' servers enabled', 'success'); this.setState({ sel: {} }); },\n      selDisable: () => { this.addToast('Disabled', selCount + ' servers disabled', 'info'); this.setState({ sel: {} }); },\n      selReload: () => { this.addToast('Reloading', selCount + ' servers re-probing…', 'info'); this.setState({ sel: {} }); },\n      selClear: () => this.setState({ sel: {} }),\n      hasAttnGroup: attn.length > 0 && !st.attnLens,\n      attnCount: String(attn.length),\n      attnOpen: st.attnOpen,\n      attnChevron: st.attnOpen ? 'rotate(90deg)' : 'rotate(0deg)',\n      toggleAttn: () => this.setState((s) => ({ attnOpen: !s.attnOpen })),\n      attnRows: attn.map((sv) => ({\n        name: sv.name,\n        reason: sv.auth ? 'OAuth token expired — re-authenticate to resume' : (sv.lastError || 'not responding to probes'),\n        reasonColor: sv.auth ? '#8a6914' : '#bd1818',\n        railColor: sv.auth ? '#e9bf41' : '#e22828',\n        needsAuth: sv.auth,\n        doAuth: () => this.addToast('Auth started', 'Opening OAuth flow for ' + sv.name + '…', 'info'),\n        test: () => this.addToast('Testing ' + sv.name, 'Probing endpoint…', 'info'),\n        reload: () => this.addToast('Reloading ' + sv.name, 'Re-probing and re-discovering catalog', 'info'),\n      })),\n      rows: tableRows.map((sv) => {\n        const selOn = !!st.sel[sv.id];\n        const rr = rng(sv.id.length * 13 + 5);\n        return {\n          name: sv.name, endpoint: sv.endpoint, transport: sv.transport,\n          nameColor: sv.enabled ? '#1c1b1b' : '#a3a3a3',\n          railColor: this.statusColor(sv),\n          rowBg: st.expanded === sv.id ? '#fffdf9' : (st.kb >= 0 && tableRows[st.kb] && tableRows[st.kb].id === sv.id ? '#fff7ed' : 'transparent'),\n          transportBg: sv.transport === 'http' ? '#dbeafe' : '#e5e7eb',\n          transportColor: sv.transport === 'http' ? '#1e40af' : '#1f2937',\n          clients: String(sv.clients), clientsColor: sv.clients > 0 ? '#1c1b1b' : '#c4c4c4',\n          uptimeSegs: (() => {\n            // bad segments proportional to downtime: 0 for >99.9%, 1 yellow for >99%, scale up as uptime drops\n            const bad = !sv.enabled ? 0 : sv.uptimePct > 99.9 ? 0 : sv.uptimePct > 99 ? 1 : Math.min(8, Math.max(2, Math.round((100 - sv.uptimePct) / 2)));\n            const badIdx = new Set();\n            while (badIdx.size < bad) badIdx.add(Math.floor(rr() * 20));\n            return Array.from({ length: 20 }, (_, i) => ({\n              color: !sv.enabled ? '#ececec' : badIdx.has(i) ? (sv.uptimePct > 98 ? '#e9bf41' : '#e22828') : '#63a659',\n            }));\n          })(),\n          uptimeLabel: sv.enabled ? sv.uptimePct + '%' : '—',\n          uptimeColor: !sv.enabled ? '#c4c4c4' : sv.uptimePct > 99 ? '#457b3e' : sv.uptimePct > 95 ? '#8a6914' : '#bd1818',\n          tools: String(sv.tools), res: String(sv.res), prompts: String(sv.prompts),\n          needsAuth: sv.auth, isDisabled: !sv.enabled,\n          doAuth: () => this.addToast('Auth started', 'Opening OAuth flow for ' + sv.name + '…', 'info'),\n          selOn,\n          selBorder: selOn ? '#ff6600' : '#d4d4d4',\n          selBg: selOn ? '#ff6600' : '#fff',\n          toggleSel: () => this.setState((s) => ({ sel: { ...s.sel, [sv.id]: !s.sel[sv.id] } })),\n          expand: () => this.setState((s) => ({ expanded: s.expanded === sv.id ? null : sv.id })),\n          collapse: () => this.setState({ expanded: null }),\n          expanded: st.expanded === sv.id,\n          copy: () => this.addToast('Endpoint copied', sv.endpoint, 'success'),\n          copyJson: () => this.addToast('.mcp.json copied', 'Connection entry for ' + sv.name, 'success'),\n          test: () => this.addToast('Testing ' + sv.name, sv.connected ? 'Connected · initialize OK' : 'Probe failed — see logs', sv.connected ? 'success' : 'error'),\n          reloadOne: () => this.addToast('Reloading ' + sv.name, 'Re-probing and re-discovering catalog', 'info'),\n          enabledOn: sv.enabled,\n          powerBg: sv.enabled ? 'hsl(24 100% 50%)' : '#e5e5e5',\n          powerTransform: sv.enabled ? 'translateX(20px)' : 'translateX(0)',\n          power: () => this.addToast(sv.enabled ? 'Disabled ' + sv.name : 'Enabled ' + sv.name, sv.enabled ? 'Removed from routing' : 'Probing and discovering catalog…', sv.enabled ? 'info' : 'success'),\n          hasLastError: !!sv.lastError, lastError: sv.lastError || '', lastErrorAge: sv.lastErrorAge || '',\n          openLogs: () => this.setState({ logsId: sv.id }),\n          openEdit: () => this.setState({ addOpen: true, editId: sv.id, importMode: false, addName: sv.name, addTransport: sv.transport, addEndpoint: sv.endpoint, addEnabled: sv.enabled }),\n          askDelete: () => this.setState({ deleteId: sv.id }),\n          hasTools: sv.tools > 0,\n          toolExposedLabel: (() => {\n            const names = this.toolsFor(sv);\n            const off = names.filter((n) => st.exposedOff[sv.id + ':' + n]).length;\n            return (names.length - off) + '/' + names.length + ' exposed' + (sv.tools > names.length ? ' (of ' + sv.tools + ')' : '');\n          })(),\n          toolRows: this.toolsFor(sv).map((n, i) => {\n            const key = sv.id + ':' + n;\n            const on = !st.exposedOff[key];\n            return {\n              name: n, on,\n              nameColor: on ? '#1c1b1b' : '#a3a3a3',\n              calls: fmt(Math.max(0, Math.round(sv.calls / (i + 2))) * winMul),\n              bg: on ? 'hsl(24 100% 50%)' : '#e5e5e5',\n              tf: on ? 'translateX(16px)' : 'translateX(0)',\n              toggle: () => {\n                this.setState((s) => ({ exposedOff: { ...s.exposedOff, [key]: !s.exposedOff[key] } }));\n                this.addToast(on ? 'Hidden ' + n : 'Exposed ' + n, on ? 'No longer routed through the gateway' : 'Now available to clients', on ? 'info' : 'success');\n              },\n            };\n          }),\n          expandStats: [\n            { label: 'Calls · ' + st.win, value: fmt(sv.calls * winMul), sub: 'via gateway', color: '#1c1b1b' },\n            { label: 'p95 latency', value: sv.p95, sub: 'tool calls', color: '#1c1b1b' },\n            { label: 'Error rate', value: sv.err + '%', sub: 'last ' + st.win, color: sv.err > 3 ? '#bd1818' : sv.err > 1 ? '#8a6914' : '#457b3e' },\n            { label: 'Status', value: this.statusLabel(sv), sub: sv.transport + ' transport', color: sv.enabled && sv.connected && sv.healthy && !sv.auth ? '#457b3e' : '#bd1818' },\n            { label: 'Exposed', value: (sv.tools + sv.res + sv.prompts) + ' surfaces', sub: sv.tools + ' tools · ' + sv.res + ' res · ' + sv.prompts + ' prompts', color: '#1c1b1b' },\n          ],\n        };\n      }),\n      footerLabel: tableRows.length + ' of ' + all.length + ' servers · ' + enabled.length + ' enabled · ' + attn.length + ' need attention',\n      toasts: st.toasts,\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
