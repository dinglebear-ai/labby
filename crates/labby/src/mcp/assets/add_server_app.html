<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Add Server</title>
<style>
:root{color-scheme:dark;--bg:#07131c;--panel:#173245;--panel-deep:#0b202d;--footer:#102636;--border:#1d3d4e;--border-strong:#28556b;--text:#e6f4fb;--muted:#a7bcc9;--accent:#29b6f6;--accent-strong:#67cbfa;--ok:#7dd3c7;--warn:#c6a36b;--error:#c78490;--focus:rgba(41,182,246,.26);font-family:Inter,Manrope,"Segoe UI",system-ui,sans-serif;color:var(--text)}
*{box-sizing:border-box}
html,body{margin:0;min-width:0;background:transparent}
body{padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left))}
button,input{font:inherit}
.dialog{width:100%;max-width:840px;margin:0 auto;overflow:hidden;border:1px solid color-mix(in srgb,var(--border-strong) 75%,transparent);border-radius:30px;background:linear-gradient(155deg,color-mix(in srgb,var(--panel) 96%,var(--accent) 4%),var(--panel));box-shadow:0 22px 54px rgba(0,0,0,.32),inset 0 1px rgba(255,255,255,.06)}
.content{padding:30px 30px 22px}
.header{display:grid;grid-template-columns:minmax(0,1fr) 44px;gap:16px;align-items:start;margin-bottom:32px}
h1{margin:0;font-size:29px;line-height:1.12;letter-spacing:-.025em;font-weight:800}
.lede{margin:8px 0 0;color:var(--muted);font-size:18px;line-height:1.35}
.close{display:grid;place-items:center;width:44px;height:44px;margin:-8px -8px 0 0;border:0;border-radius:12px;background:transparent;color:var(--muted);cursor:pointer}
.close:hover{background:rgba(255,255,255,.04);color:var(--text)}
.close:focus-visible,.button:focus-visible,.switch:focus-visible,input:focus-visible{outline:0;box-shadow:0 0 0 3px var(--focus)}
.fields{display:grid;gap:22px}
.field{display:grid;gap:9px}
label,.eyebrow{color:var(--muted);font-size:15px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
input[type=text]{width:100%;min-height:58px;border:1px solid color-mix(in srgb,var(--border) 58%,transparent);border-radius:21px;background:var(--panel-deep);padding:0 17px;color:var(--text);font-size:18px;caret-color:var(--accent);transition:border-color .16s ease,box-shadow .16s ease,background .16s ease}
input[type=text]::placeholder{color:color-mix(in srgb,var(--muted) 64%,transparent)}
input[type=text]:hover{border-color:var(--border-strong)}
input[type=text]:focus{border-color:var(--accent);background:#0a1d29}
.help{margin:0;color:var(--muted);font-size:16px;line-height:1.35}
.options{display:grid;gap:1px;margin-top:20px;padding-top:2px;border-top:1px solid color-mix(in srgb,var(--border) 52%,transparent)}
.option{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:center;min-height:75px;padding:16px 0}
.option+.option{border-top:1px solid color-mix(in srgb,var(--border) 28%,transparent)}
.option-title{font-size:17px;font-weight:800;line-height:1.25}
.option-copy{margin-top:2px;color:var(--muted);font-size:15px;line-height:1.35}
.switch{position:relative;width:52px;height:30px;flex:none;border:0;border-radius:999px;background:var(--border-strong);cursor:pointer;transition:background .16s ease}
.switch::after{content:"";position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;background:var(--text);box-shadow:0 2px 5px rgba(0,0,0,.35);transition:transform .16s ease}
.switch[aria-checked=true]{background:var(--accent)}
.switch[aria-checked=true]::after{transform:translateX(22px);background:#062033}
.status{display:none;margin-top:17px;padding:11px 13px;border:1px solid var(--border);border-radius:12px;background:color-mix(in srgb,var(--panel-deep) 72%,transparent);font-size:14px;line-height:1.4;color:var(--muted)}
.status.show{display:block}.status.ok{border-color:color-mix(in srgb,var(--ok) 42%,var(--border));color:var(--ok)}.status.error{border-color:color-mix(in srgb,var(--error) 52%,var(--border));color:#efb5bf}
.footer{display:flex;align-items:center;gap:12px;padding:20px 30px;background:color-mix(in srgb,var(--footer) 94%,transparent);border-top:1px solid color-mix(in srgb,var(--border) 72%,transparent)}
.footer-spacer{flex:1}
.button{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:50px;padding:0 20px;border:1px solid var(--border);border-radius:18px;background:transparent;color:var(--muted);font-weight:800;cursor:pointer;white-space:nowrap;transition:transform .12s ease,border-color .16s ease,background .16s ease,color .16s ease}
.button:hover{border-color:var(--border-strong);color:var(--text)}
.button:active{transform:translateY(1px)}
.button.primary{min-width:178px;border-color:var(--accent-strong);background:var(--accent);color:#061923;box-shadow:inset 0 1px rgba(255,255,255,.34),0 0 0 1px rgba(41,182,246,.13)}
.button.primary:hover{background:var(--accent-strong)}
.button:disabled{opacity:.52;cursor:wait;transform:none}
.play{font-size:18px;font-weight:500}.spinner{width:16px;height:16px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important;animation-duration:.001ms!important}}
@media (max-width:620px){
 body{padding:0}
 .dialog{border-radius:22px;box-shadow:none}
 .content{padding:22px 18px 17px}
 .header{grid-template-columns:minmax(0,1fr) 40px;gap:10px;margin-bottom:24px}
 h1{font-size:25px}.lede{font-size:15px;max-width:31ch}.close{width:40px;height:40px;margin:-6px -6px 0 0}
 .fields{gap:19px}label,.eyebrow{font-size:13px}input[type=text]{min-height:52px;border-radius:16px;padding:0 14px;font-size:16px}.help{font-size:14px}
 .options{margin-top:16px}.option{min-height:72px;padding:14px 0;gap:12px}.option-title{font-size:15px}.option-copy{font-size:13px}.switch{width:48px;height:28px}.switch::after{width:20px;height:20px}.switch[aria-checked=true]::after{transform:translateX(20px)}
 .footer{display:grid;grid-template-columns:1fr 1fr;padding:14px 18px max(14px,env(safe-area-inset-bottom));gap:10px}.footer-spacer{display:none}.button{min-height:48px;border-radius:15px;padding:0 14px}.button.primary{grid-column:1/-1;grid-row:1;min-width:0}.button.test{grid-column:1}.button.cancel{grid-column:2}
}
@media (max-width:390px){.footer{grid-template-columns:1fr}.button.primary,.button.test,.button.cancel{grid-column:1}.button.primary{grid-row:1}.button.test{grid-row:2}.button.cancel{grid-row:3}.option-copy{max-width:23ch}}
</style>
</head>
<body>
<main class="dialog" aria-labelledby="title">
  <section class="content">
    <header class="header">
      <div><h1 id="title">Add Server</h1><p class="lede">Connect an upstream MCP server to the gateway catalog.</p></div>
      <button class="close" id="close" type="button" aria-label="Close Add Server">&#10005;</button>
    </header>
    <form id="form" novalidate>
      <div class="fields">
        <div class="field"><label for="name">Server name</label><input id="name" name="name" type="text" placeholder="e.g. github-mcp" autocomplete="off" spellcheck="false" required></div>
        <div class="field"><label for="target">Command / endpoint</label><input id="target" name="target" type="text" placeholder="https://host.example.com/mcp · npx -y @scope/mcp-server" autocomplete="off" spellcheck="false" required><p class="help">Paste a URL for a remote server, or the command that starts a local one — the transport is detected automatically.</p></div>
      </div>
      <div class="options">
        <div class="option"><div><div class="option-title">Expose Resources</div><div class="option-copy">Proxy discovered MCP resources downstream.</div></div><button class="switch" id="resources" type="button" role="switch" aria-checked="true" aria-label="Expose Resources"></button></div>
        <div class="option"><div><div class="option-title">Expose Prompts</div><div class="option-copy">Proxy discovered MCP prompts downstream.</div></div><button class="switch" id="prompts" type="button" role="switch" aria-checked="true" aria-label="Expose Prompts"></button></div>
      </div>
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </form>
  </section>
  <footer class="footer">
    <button class="button test" id="test" type="button"><span class="play">&#9655;</span><span>Test Connection</span></button>
    <span class="footer-spacer"></span>
    <button class="button cancel" id="cancel" type="button">Cancel</button>
    <button class="button primary" id="create" type="submit" form="form">Create Server</button>
  </footer>
</main>
<script>window.__LABBY_APP_INFO={name:"LabbyAddServer",version:"1.0.0"};</script>
<script src="/apps/assets/labby-app-host.js"></script>
<script>
(() => {
"use strict";
const host=window.LabbyAppHost||{
 callAction:async()=>{throw new Error("Open this form from an MCP Apps-capable Labby host.")},
 requestResize:()=>{},
 requestTeardown:()=>{if(history.length>1)history.back()}
};
const form=document.getElementById("form");
const nameInput=document.getElementById("name");
const targetInput=document.getElementById("target");
const resources=document.getElementById("resources");
const prompts=document.getElementById("prompts");
const status=document.getElementById("status");
const testButton=document.getElementById("test");
const createButton=document.getElementById("create");
const dialog=document.querySelector(".dialog");
let busy=false;
function toggle(button){button.setAttribute("aria-checked",button.getAttribute("aria-checked")!=="true"?"true":"false")}
resources.addEventListener("click",()=>toggle(resources));prompts.addEventListener("click",()=>toggle(prompts));
function words(value){
 const out=[];let token="",quote=null,escape=false;
 for(const char of value.trim()){
  if(escape){token+=char;escape=false;continue}
  if(char==="\\"&&quote!=="'"){escape=true;continue}
  if(quote){if(char===quote)quote=null;else token+=char;continue}
  if(char==='"'||char==="'"){quote=char;continue}
  if(/\s/.test(char)){if(token){out.push(token);token=""}continue}
  token+=char;
 }
 if(escape)token+="\\";if(quote)throw new Error("Close the quoted command argument.");if(token)out.push(token);return out;
}
function spec(){
 const name=nameInput.value.trim();const target=targetInput.value.trim();
 if(!name){nameInput.focus();throw new Error("Enter a server name.")}
 if(!/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(name)){nameInput.focus();throw new Error("Use letters, numbers, dots, dashes, or underscores in the server name.")}
 if(!target){targetInput.focus();throw new Error("Enter an MCP endpoint or local command.")}
 const value={name,enabled:true,proxy_resources:resources.getAttribute("aria-checked")==="true",proxy_prompts:prompts.getAttribute("aria-checked")==="true"};
 if(/^https?:\/\//i.test(target)){value.url=target}else{const parts=words(target);if(!parts.length)throw new Error("Enter a local command.");value.command=parts.shift();value.args=parts}
 return value;
}
function message(text,kind=""){status.textContent=text;status.className=`status show ${kind}`.trim();scheduleResize()}
function clearMessage(){status.textContent="";status.className="status";scheduleResize()}
function normalize(value){
 if(!value)return value;if(value.structuredContent)return normalize(value.structuredContent);
 if(value.ok===false)throw new Error(value.error&&value.error.message||"The gateway request failed.");
 if(value.ok===true)return value.data;
 if(Array.isArray(value.content)&&value.content[0]&&value.content[0].text){try{return normalize(JSON.parse(value.content[0].text))}catch(_){}}
 return value;
}
function setBusy(value,button){busy=value;testButton.disabled=value;createButton.disabled=value;const label=button&&button.querySelector("span:last-child");if(button){button.dataset.label=label?label.textContent:button.textContent;if(label)label.innerHTML=value?'<span class="spinner"></span> Working…':button.dataset.label;else button.innerHTML=value?'<span class="spinner"></span> Working…':button.dataset.label}}
async function run(action,button){
 if(busy)return;clearMessage();let config;try{config=spec()}catch(error){message(error.message,"error");return}
 setBusy(true,button);
 try{const result=normalize(await host.callAction("add_server",action,{spec:config}));if(action==="test"){const reachable=result&&result.reachable!==false;message(reachable?"Connection succeeded. The server is ready to add.":"The server responded, but the connection check did not pass.",reachable?"ok":"error")}else{message(`Created ${config.name}. The gateway catalog is reconciling.`,"ok");setTimeout(closeApp,700)}}catch(error){message((error&&error.message)||"The gateway request failed.","error")}finally{setBusy(false,button)}
}
function closeApp(){if(host&&typeof host.requestTeardown==="function")host.requestTeardown();else if(history.length>1)history.back()}
function scheduleResize(){requestAnimationFrame(()=>{const rect=dialog.getBoundingClientRect();host.requestResize({width:Math.ceil(rect.width),height:Math.ceil(rect.height+20)})})}
form.addEventListener("submit",event=>{event.preventDefault();void run("create",createButton)});
testButton.addEventListener("click",()=>void run("test",testButton));
document.getElementById("cancel").addEventListener("click",closeApp);document.getElementById("close").addEventListener("click",closeApp);
new ResizeObserver(scheduleResize).observe(dialog);scheduleResize();
})();
</script>
</body>
</html>
