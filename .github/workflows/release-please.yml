name: release-please

# Drives versioning + changelog from Conventional Commits.
#
# On every green CI run on main, release-please maintains a "release PR" that
# bumps `.release-please-manifest.json` and updates CHANGELOG.md. Merging that
# PR creates the git tag (vX.Y.Z) and a GitHub Release, which in turn triggers
# release.yml (push: tags: v*.*.*) to build and publish the Linux/Windows
# archives and GHCR image.
#
# release-type is "simple", NOT "rust". release-please's rust/cargo-workspace
# support cannot handle this workspace's structure: the root Cargo.toml is a
# pure virtual workspace manifest (no [package] table) and every member crate
# uses `version.workspace = true` (inherited version, no literal version
# string). release-please's CargoToml updater unconditionally tries to write
# a resolved version into `[package].version` for any file literally named
# Cargo.toml, which throws ("is not a package manifest" for the virtual root,
# "value at path package.version is not tagged" for inherited-version member
# crates) regardless of release-type/extra-files config — verified directly
# against the release-please library source, not a hypothesis. See
# docs/sessions for the investigation if this needs revisiting upstream.
#
# So release-please here only manages CHANGELOG.md + the manifest + the git
# tag/GitHub Release. The `sync-release-version` job below runs after it opens
# or updates a release PR and separately patches [workspace.package].version,
# the npm launcher package version, and MCP registry metadata before
# regenerating Cargo.lock and pushing an extra commit onto that same PR branch.
# By the time the PR is merged, Cargo.toml, Cargo.lock, package.json,
# server.json, the manifest, and CHANGELOG.md are all in sync.
#
# IMPORTANT: `token` must be a PAT or GitHub App token with `contents: write`
# and `pull-requests: write`. The default GITHUB_TOKEN deliberately does NOT
# trigger downstream workflows, so a tag it creates would never reach
# release.yml. Store the token as the RELEASE_PLEASE_TOKEN secret.
#
# WARNING — silent failure mode: a classic PAT EXPIRES SILENTLY. When it
# lapses, this job simply stops opening/updating release PRs — no error, no
# alert — and releases quietly halt until someone notices. Prefer a GitHub
# App installation token (no expiry, scoped to exactly these permissions,
# and auditable per install) over a classic PAT. If you must use a PAT, set a
# calendar reminder tied to its expiry date so it gets rotated before it
# lapses.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  # Persistent per-runner zccache compile store for soldr (replaces sccache).
  SOLDR_CACHE_DIR: ${{ github.workspace }}/../.soldr-cache

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, unraid]
    permissions:
      contents: write       # required to create release commits and tags
      pull-requests: write  # required to create and update release PRs
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      - name: Require release-please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: test -n "$RELEASE_PLEASE_TOKEN"
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-release-version:
    name: Sync release metadata to release PR version
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    runs-on: [self-hosted, unraid]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
          persist-credentials: true

      - name: Install Rust + soldr
        uses: ./.github/actions/setup-rust-soldr

      - name: Patch release metadata and regenerate Cargo.lock
        run: |
          set -euo pipefail
          new_version="$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")"
          echo "Syncing release metadata to $new_version"
          python3 - "$new_version" << 'PY'
          import json
          import re
          import sys
          new_version = sys.argv[1]
          path = "Cargo.toml"
          text = open(path).read()
          patched, count = re.subn(
              r'(\[workspace\.package\][^\[]*?\nversion = ")[^"]+(")',
              lambda m: m.group(1) + new_version + m.group(2),
              text,
              count=1,
              flags=re.DOTALL,
          )
          if count != 1:
              raise SystemExit(f"expected exactly 1 substitution in {path}, got {count}")
          open(path, "w").write(patched)

          package_path = "packages/labby-mcp/package.json"
          with open(package_path) as fh:
              package = json.load(fh)
          package["version"] = new_version
          with open(package_path, "w") as fh:
              json.dump(package, fh, indent=2)
              fh.write("\n")

          server_path = "server.json"
          with open(server_path) as fh:
              server = json.load(fh)
          server["version"] = new_version
          for package in server.get("packages", []):
              package["version"] = new_version
              if package.get("registryType") == "oci":
                  package["identifier"] = f"ghcr.io/jmagar/labby:v{new_version}"
          publisher = server.get("_meta", {}).get("io.modelcontextprotocol.registry/publisher-provided", {})
          distribution = publisher.get("distribution")
          if isinstance(distribution, dict):
              distribution["npm"] = f"labby-mcp@{new_version}"
          build_info = publisher.get("buildInfo")
          if isinstance(build_info, dict):
              build_info["version"] = new_version
          with open(server_path, "w") as fh:
              json.dump(server, fh, indent=2)
              fh.write("\n")
          PY
          cargo check --workspace --all-features
          git diff --stat -- Cargo.toml Cargo.lock packages/labby-mcp/package.json server.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          paths=(Cargo.toml Cargo.lock packages/labby-mcp/package.json server.json)
          if git diff --quiet -- "${paths[@]}"; then
            echo "Release metadata already in sync, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${paths[@]}"
          git commit -m "chore: sync release metadata to release version"
          git push origin HEAD:"${{ fromJson(needs.release-please.outputs.pr).headBranchName }}"
