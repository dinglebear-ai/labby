<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Gateway Status</title>
<style>
:root{color-scheme:dark;--bg:#0b202d;--panel:#173245;--border:#1d3d4e;--text:#e6f4fb;--muted:#a7bcc9;--accent:#29b6f6;--ok:#7dd3c7;--warn:#c6a36b;--error:#c78490;font-family:Inter,Manrope,"Segoe UI",system-ui,sans-serif;color:var(--text)}
*{box-sizing:border-box}html,body{margin:0;min-width:0;background:transparent}body{padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left))}button{font:inherit}
.shell{width:100%;max-width:900px;margin:auto;border:1px solid var(--border);border-radius:28px;overflow:hidden;background:linear-gradient(155deg,#18364a,var(--panel));box-shadow:0 22px 54px rgba(0,0,0,.3)}
header{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;padding:28px 28px 20px}h1{margin:0;font-size:28px;letter-spacing:-.025em}.lede{margin:7px 0 0;color:var(--muted);font-size:16px}.refresh{min-height:44px;padding:0 16px;border:1px solid #28556b;border-radius:14px;background:var(--bg);color:var(--text);font-weight:750;cursor:pointer}.refresh:hover{border-color:var(--accent)}.refresh:focus-visible{outline:3px solid rgba(41,182,246,.3);outline-offset:2px}.refresh:disabled{opacity:.58;cursor:wait}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 28px 22px}.metric{padding:16px;border:1px solid var(--border);border-radius:18px;background:rgba(7,19,28,.42)}.metric strong{display:block;font-size:26px}.metric span{color:var(--muted);font-size:13px;font-weight:750;text-transform:uppercase;letter-spacing:.08em}.metric.connected strong{color:var(--ok)}.metric.attention strong{color:var(--warn)}
.toolbar{display:flex;gap:10px;padding:0 28px 18px}.filter{flex:1;min-width:0;min-height:44px;border:1px solid var(--border);border-radius:14px;background:var(--bg);padding:0 14px;color:var(--text);font:inherit}.filter:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px rgba(41,182,246,.18)}
.status{min-height:20px;margin:0 28px 14px;color:var(--muted);font-size:14px}.status.error{color:var(--error)}.list{display:grid;gap:9px;padding:0 28px 28px}.server{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;padding:15px 16px;border:1px solid var(--border);border-radius:18px;background:rgba(7,19,28,.42)}.identity{min-width:0}.name{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.details{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px;color:var(--muted);font-size:13px}.warnings{display:grid;gap:4px;margin:7px 0 0;padding-left:18px;color:var(--warn);font-size:13px;line-height:1.35}.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;background:rgba(145,168,182,.12);color:var(--muted);font-size:12px;font-weight:800}.badge::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor}.badge.connected{color:var(--ok);background:rgba(125,211,199,.1)}.badge.disconnected{color:var(--error);background:rgba(199,132,144,.1)}.badge.disabled{color:var(--muted);background:rgba(145,168,182,.12)}.empty{padding:32px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:18px}
@media(max-width:560px){body{padding:0}.shell{border-radius:0;border-left:0;border-right:0}header{padding:22px 18px 18px}h1{font-size:24px}.lede{font-size:14px}.refresh{padding:0 12px}.summary{padding:0 18px 18px;gap:8px}.metric{padding:12px}.metric strong{font-size:22px}.metric span{font-size:10px}.toolbar{padding:0 18px 14px}.status{margin:0 18px 12px}.list{padding:0 18px 22px}.server{grid-template-columns:1fr;gap:10px}.badge{justify-self:start}}
</style>
<script>window.__LABBY_APP_INFO={name:"LabbyGatewayStatus",version:"0.1.0"};</script>
<script src="/apps/assets/labby-app-host.js"></script>
</head>
<body>
<main class="shell" id="shell">
  <header><div><h1>Gateway Status</h1><p class="lede">Live health and capabilities for connected upstream MCP servers.</p></div><button class="refresh" id="refresh" type="button">Refresh</button></header>
  <section class="summary" aria-label="Gateway summary">
    <div class="metric connected"><strong id="connected">—</strong><span>Connected</span></div>
    <div class="metric"><strong id="enabled">—</strong><span>Enabled</span></div>
    <div class="metric attention"><strong id="attention">—</strong><span>Attention</span></div>
  </section>
  <div class="toolbar"><input class="filter" id="filter" type="search" placeholder="Filter upstreams…" aria-label="Filter upstreams"></div>
  <p class="status" id="status" role="status" aria-live="polite">Loading live gateway status…</p>
  <section class="list" id="list" aria-label="Gateway upstreams"></section>
</main>
<script>
(()=>{"use strict";
const host=window.LabbyAppHost,shell=document.getElementById("shell"),list=document.getElementById("list"),status=document.getElementById("status"),refresh=document.getElementById("refresh"),filter=document.getElementById("filter"),connected=document.getElementById("connected"),enabled=document.getElementById("enabled"),attention=document.getElementById("attention");let upstreams=[],lastUpdated=null,disposed=false,frame=null;
function normalize(value){if(value==null)return value;if(Array.isArray(value))return value;if(value.structuredContent!=null)return normalize(value.structuredContent);if(value.data!=null)return normalize(value.data);if(Array.isArray(value.content)&&value.content[0]&&value.content[0].text){try{return normalize(JSON.parse(value.content[0].text))}catch(_){}}return value}
function text(value){return String(value==null?"":value).replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[char])}
function plural(count,one,many=`${one}s`){return count===1?one:many}
function warningMessage(warning){return warning&&typeof warning==="object"?(warning.message||warning.code||"Unknown warning"):String(warning||"Unknown warning")}
function capabilities(item){return Number(item.exposed_tool_count??item.discovered_tool_count??0)+Number(item.exposed_resource_count??item.discovered_resource_count??0)+Number(item.exposed_prompt_count??item.discovered_prompt_count??0)}
function render(){const query=filter.value.trim().toLowerCase();const visible=upstreams.filter(item=>String(item.name||item.id||"").toLowerCase().includes(query));connected.textContent=String(upstreams.filter(item=>item.connected).length);enabled.textContent=String(upstreams.filter(item=>item.enabled).length);attention.textContent=String(upstreams.filter(item=>item.enabled&&(!item.connected||(Array.isArray(item.warnings)&&item.warnings.length>0))).length);list.innerHTML=visible.length?visible.map(item=>{const name=text(item.name||item.id||"Unnamed upstream"),isConnected=!!item.connected,warnings=Array.isArray(item.warnings)?item.warnings:[],count=capabilities(item),badgeClass=isConnected?"connected":item.enabled?"disconnected":"disabled",badgeLabel=isConnected?"Connected":item.enabled?"Disconnected":"Disabled";return `<article class="server"><div class="identity"><div class="name">${name}</div><div class="details"><span>${count} ${plural(count,"capability","capabilities")}</span><span>${text(item.config_summary&&item.config_summary.transport||item.source||"gateway")}</span></div>${warnings.length?`<ul class="warnings">${warnings.map(warning=>`<li>${text(warningMessage(warning))}</li>`).join("")}</ul>`:""}</div><span class="badge ${badgeClass}">${badgeLabel}</span></article>`}).join(""):`<div class="empty">${query?"No upstreams match this filter.":"No upstreams are visible on this route."}</div>`;scheduleResize()}
function applySnapshot(raw){const value=normalize(raw);if(!Array.isArray(value))throw new Error("Gateway status returned an invalid snapshot.");upstreams=value;lastUpdated=new Date();status.className="status";status.textContent=`Updated ${lastUpdated.toLocaleTimeString()} · ${upstreams.length} visible ${plural(upstreams.length,"upstream")}`;render()}
async function load(){if(disposed)return;refresh.disabled=true;status.className="status";status.textContent="Refreshing live gateway status…";try{const raw=await host.callAction("gateway_status","refresh",{});if(!disposed)applySnapshot(raw)}catch(error){if(!disposed){status.className="status error";status.textContent=lastUpdated?`Refresh failed; showing data from ${lastUpdated.toLocaleTimeString()}.`:(error&&error.message)||"Gateway status could not be loaded."}}finally{if(!disposed)refresh.disabled=false}}
function acceptToolOutput(raw){if(raw==null||disposed)return false;try{applySnapshot(raw);return true}catch(error){status.className="status error";status.textContent=(error&&error.message)||"Gateway status could not be loaded.";return false}}
function onOpenAiGlobals(event){const globals=event&&event.detail&&event.detail.globals;if(globals&&Object.prototype.hasOwnProperty.call(globals,"toolOutput"))acceptToolOutput(globals.toolOutput)}
function onMcpMessage(event){const data=event&&event.data;if(event.source===window.parent&&data&&data.method==="ui/notifications/tool-result")acceptToolOutput(data.params)}
function onRefresh(){void load()}
function onFilter(){render()}
function scheduleResize(){if(disposed||frame!==null)return;frame=requestAnimationFrame(()=>{frame=null;if(!disposed)host.requestResize({width:Math.ceil(shell.getBoundingClientRect().width),height:Math.ceil(shell.scrollHeight)})})}
const observer=new ResizeObserver(scheduleResize);
function dispose(){disposed=true;observer.disconnect();refresh.removeEventListener("click",onRefresh);filter.removeEventListener("input",onFilter);window.removeEventListener("openai:set_globals",onOpenAiGlobals);window.removeEventListener("message",onMcpMessage);if(frame!==null){cancelAnimationFrame(frame);frame=null}}
refresh.addEventListener("click",onRefresh);filter.addEventListener("input",onFilter);window.addEventListener("openai:set_globals",onOpenAiGlobals);window.addEventListener("message",onMcpMessage);observer.observe(shell);window.addEventListener("pagehide",dispose,{once:true});scheduleResize();if(!acceptToolOutput(window.openai&&window.openai.toolOutput))void load();
})();
</script>
</body>
</html>
