name: Build Incus image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/actions/build-gateway-admin/action.yml
      - .github/workflows/build-incus-image.yml
      - apps/gateway-admin/**
      - config/Dockerfile
      - config/incus/**
      - scripts/incus-bootstrap.sh
      - crates/**
      - scripts/ci/build-incus-image.sh
      - scripts/ci/smoke-incus-image.sh
      - Cargo.lock
      - Cargo.toml
  pull_request:
    paths:
      # PRs only run the expensive Incus image build when the image definition,
      # bootstrap/smoke scripts, or this workflow changes. Main pushes stay
      # broader so the rolling image still captures binary and web asset changes.
      - .github/workflows/build-incus-image.yml
      - config/incus/**
      - scripts/incus-bootstrap.sh
      - scripts/ci/build-incus-image.sh
      - scripts/ci/smoke-incus-image.sh

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTC_WRAPPER: ""
  CARGO_BUILD_RUSTC_WRAPPER: ""
  DISTROBUILDER_SNAP_REVISION: "2114"

jobs:
  build-image:
    name: Build and smoke Incus image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: ./.github/actions/build-gateway-admin

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install validation and image dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y debootstrap gpg incus rsync shellcheck squashfs-tools uidmap
          sudo snap install distrobuilder --classic --revision "$DISTROBUILDER_SNAP_REVISION"
          sudo distrobuilder --version
          snap list distrobuilder
          # Ubuntu runner packages are bound to GitHub's reviewed image
          # snapshot; record the resolved versions because cross-image apt
          # version pins are not stable or consistently retained.
          dpkg-query -W debootstrap gpg incus rsync shellcheck squashfs-tools uidmap
          sudo incus admin init --minimal || true

      - name: Validate image scripts and definition
        run: |
          set -euo pipefail
          sh -n scripts/incus-bootstrap.sh
          bash -n scripts/ci/build-incus-image.sh scripts/ci/smoke-incus-image.sh
          shellcheck scripts/incus-bootstrap.sh scripts/ci/build-incus-image.sh scripts/ci/smoke-incus-image.sh
          sudo distrobuilder validate config/incus/labby-image.yaml -o image.serial=ci

      - name: Build Labby release binary
        run: cargo build --workspace --all-features --locked --release --target x86_64-unknown-linux-gnu

      - name: Package Linux binary
        run: |
          set -euo pipefail
          mkdir -p target/incus-image-input
          cp target/x86_64-unknown-linux-gnu/release/labby target/incus-image-input/labby
          tar -C target/incus-image-input -czf target/incus-image-input/lab-x86_64-unknown-linux-gnu.tar.gz labby

      - name: Build and export image
        run: |
          set -euo pipefail
          image_serial="${GITHUB_REF_NAME:-ci}-${GITHUB_SHA::12}"
          image_serial="${image_serial//[^A-Za-z0-9_.-]/-}"
          scripts/ci/build-incus-image.sh \
            "$image_serial" \
            target/incus-image-input/lab-x86_64-unknown-linux-gnu.tar.gz \
            dist

      - name: Smoke test exported image
        run: scripts/ci/smoke-incus-image.sh
        env:
          EXPORT_DIR: ${{ github.workspace }}/dist
          IMAGE_ALIAS: labby-incus-ci-smoke
          SMOKE_CONTAINER_NAME: labby-incus-ci-smoke
          SMOKE_PROFILE_NAME: labby-gateway-ci-smoke

      - name: Upload Incus image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: labby-incus-image
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-image:
    name: Publish immutable Incus image and advance rolling alias
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: labby-incus-image
          path: dist
      - name: Publish verified immutable image, then move rolling alias
        env:
          GH_TOKEN: ${{ github.token }}
          ROLLING_TAG: labby-incus-latest
        run: |
          set -euo pipefail
          immutable_tag="labby-incus-${GITHUB_SHA::12}"
          (cd dist && sha256sum --check --strict ./*.sha256)
          release_notes="$(mktemp)"
          cat >"$release_notes" <<EOF
          Immutable Labby Incus image built from \`${GITHUB_SHA}\`.

          - Repository: ${GITHUB_REPOSITORY}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Source branch: ${GITHUB_REF_NAME}
          EOF
          if gh release view "$immutable_tag" >/dev/null 2>&1; then
            echo "::error::immutable Incus release already exists: $immutable_tag"
            exit 1
          else
            gh release create "$immutable_tag" dist/* --target "$GITHUB_SHA" \
              --title "$immutable_tag" --notes-file "$release_notes" --latest=false
          fi
          verify_dir="$(mktemp -d)"
          gh release download "$immutable_tag" --dir "$verify_dir"
          (cd "$verify_dir" && sha256sum --check --strict ./*.sha256)

          rolling_notes="$(mktemp)"
          printf "Rolling pointer to immutable release \`%s\`.\n\nSource commit: \`%s\`\n" \
            "$immutable_tag" "$GITHUB_SHA" > "$rolling_notes"
          if gh release view "$ROLLING_TAG" >/dev/null 2>&1; then
            gh release upload "$ROLLING_TAG" "$verify_dir"/* --clobber
            while IFS= read -r asset; do
              [[ -z "$asset" || -f "$verify_dir/$asset" ]] || \
                gh release delete-asset "$ROLLING_TAG" "$asset" --yes
            done < <(gh release view "$ROLLING_TAG" --json assets --jq '.assets[].name')
            gh release edit "$ROLLING_TAG" --title "labby-incus latest" \
              --notes-file "$rolling_notes" --latest=false
          else
            gh release create "$ROLLING_TAG" "$verify_dir"/* --target "$GITHUB_SHA" \
              --title "labby-incus latest" --notes-file "$rolling_notes" --latest=false
          fi

          # Prove the rolling release now serves the exact immutable assets.
          # The tag itself does not move until this remote checksum succeeds.
          rolling_verify_dir="$(mktemp -d)"
          gh release download "$ROLLING_TAG" --dir "$rolling_verify_dir"
          (cd "$rolling_verify_dir" && sha256sum --check --strict ./*.sha256)

          # The mutable alias advances only after immutable publication and
          # both immutable and rolling remote checksum verification complete.
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$ROLLING_TAG"
