name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update:
    # OpenWiki uses Jacob's OpenAI-compatible gateway. GitHub-hosted runners
    # hit Cloudflare managed challenges on that endpoint, so run this trusted
    # scheduled/manual workflow on the same private Linux runner class used for
    # privileged CI.
    runs-on: [self-hosted, linux-lab]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Preflight OpenWiki API
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: ${{ vars.OPENAI_COMPATIBLE_BASE_URL || 'https://cli-api.tootie.tv/v1' }}
        run: |
          set -euo pipefail

          if [[ -z "${OPENAI_COMPATIBLE_API_KEY}" ]]; then
            echo "::error::OPENAI_COMPATIBLE_API_KEY secret is required for OpenWiki updates"
            exit 1
          fi
          if [[ -z "${OPENAI_COMPATIBLE_BASE_URL}" ]]; then
            echo "::error::OPENAI_COMPATIBLE_BASE_URL is empty"
            exit 1
          fi

          response="$(mktemp)"
          status="$(
            curl --silent --show-error --location \
              --output "$response" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${OPENAI_COMPATIBLE_API_KEY}" \
              "${OPENAI_COMPATIBLE_BASE_URL%/}/models" || true
          )"
          if [[ "$status" != "200" ]]; then
            echo "::error::OpenWiki API preflight failed for ${OPENAI_COMPATIBLE_BASE_URL%/}/models with HTTP ${status}"
            head -c 300 "$response" | tr '\n' ' '
            echo
            exit 1
          fi

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: ${{ vars.OPENAI_COMPATIBLE_BASE_URL || 'https://cli-api.tootie.tv/v1' }}
          OPENWIKI_MODEL_ID: ${{ vars.OPENWIKI_MODEL_ID || 'gpt-5.3-codex-spark' }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
