# =============================================================================
# .cargo/config.toml — Cargo workspace configuration for lab
#
# Most build settings (linker, profile tuning, jobs) live in the developer's
# ~/.cargo/config.toml. This file only adds workspace-local settings that the
# global config cannot provide.
#
# See docs/RUST.md for expected global config and system tool requirements.
# See https://github.com/jmagar/rmcp-template/blob/main/docs/RUST.md for the
# canonical family reference.
# =============================================================================

# Keep Lab cache-friendly even if a developer's global Cargo config differs.
# The managed host config also disables incremental builds for sccache, but a
# repo-local override prevents accidental cache-bypassing profile overrides.
[build]
incremental = false

[profile.dev]
# The all-features labby test harness is large enough that LLVM can exhaust
# memory on this host when the global Cargo config forces debug info on.
debug = 0

[profile.test]
debug = 0
